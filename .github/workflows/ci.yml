name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build -- --force
      - run: npm run typecheck
      - run: npm test -- --force
      - run: npm run lint -- --force
      - run: npm run format:check
      - run: npm audit --json
      - run: node packages/cli/dist/cli.js --help

      # --- Stop-the-line gates (required) ---
      - name: Claude smoke test
        run: |
          node packages/cli/bin/install.cjs --claude --lang en
          node packages/cli/bin/smoke-test.cjs --runtime claude
      - name: Codex smoke test
        run: |
          node packages/cli/bin/install.cjs --codex --lang en
          node packages/cli/bin/smoke-test.cjs --runtime codex
      - name: Cursor smoke test
        run: |
          node packages/cli/bin/install.cjs --cursor --lang en
          node packages/cli/bin/smoke-test.cjs --runtime cursor
      - name: Antigravity smoke test
        run: |
          node packages/cli/bin/install.cjs --antigravity --lang en
          node packages/cli/bin/smoke-test.cjs --runtime antigravity
      - name: Contract lint
        run: node packages/cli/bin/contract-lint.cjs
      - name: Release artifact smoke
        run: npm run test:artifact --workspace popcoru

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run release:gate
      - name: Publish to npm
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Verify npm registry artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm view "popcoru@${VERSION}" version dist.tarball dist.integrity
          npm run test:artifact --workspace popcoru -- --registry "popcoru@${VERSION}"
