name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build -- --force
      - run: npm run typecheck
      - run: npm test -- --force
      - run: npm run lint -- --force
      - run: npm run format:check
      - run: npm audit --json
      - run: node packages/cli/dist/cli.js --help

      # --- Stop-the-line gates (required) ---
      - name: Claude smoke test
        run: |
          node packages/cli/bin/install.cjs --claude --lang en
          node packages/cli/bin/smoke-test.cjs --runtime claude
      - name: Codex smoke test
        run: |
          node packages/cli/bin/install.cjs --codex --lang en
          node packages/cli/bin/smoke-test.cjs --runtime codex
      - name: Cursor smoke test
        run: |
          node packages/cli/bin/install.cjs --cursor --lang en
          node packages/cli/bin/smoke-test.cjs --runtime cursor
      - name: Antigravity smoke test
        run: |
          node packages/cli/bin/install.cjs --antigravity --lang en
          node packages/cli/bin/smoke-test.cjs --runtime antigravity
      - name: Contract lint
        run: node packages/cli/bin/contract-lint.cjs
      - name: Release artifact smoke
        run: npm run test:artifact --workspace popcoru

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Resolve release version
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./packages/cli/package.json').version")"

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag v${VERSION} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if npm view "popcoru@${VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "popcoru@${VERSION} is already published; publish step will be skipped."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "popcoru@${VERSION} is not published yet; publish step will run."
          fi
      - run: npm run release:gate
      - name: Check npm token
        if: steps.release.outputs.published != 'true'
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required to publish popcoru@${{ steps.release.outputs.version }}" >&2
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm
        if: steps.release.outputs.published != 'true'
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Verify npm registry artifact
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          npm view "popcoru@${VERSION}" version dist.tarball dist.integrity
          npm run test:artifact --workspace popcoru -- --registry "popcoru@${VERSION}"
